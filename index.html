<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>პროდუქციის მართვის სისტემა</title>
  <style>
    /* ზოგადი სტილები */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f4f6f9;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* პროდუქტის დამატების ფორმა */
    .form-container {
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      margin-bottom: 40px;
    }

    .form-group {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .form-group input {
      flex: 1 1 calc(50% - 15px);
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #007bff;
    }

    .btn-add {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add:hover {
      background-color: #218838;
    }

    /* პროდუქტების ბადე (Grid) */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    /* პროდუქტის ბარათი */
    .product-card {
      background: #ffffff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s;
    }

    .product-card:hover {
      transform: translateY(-4px);
    }

    .product-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background-color: #eee;
    }

    .product-info {
      padding: 15px;
    }

    .product-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .product-price {
      font-size: 16px;
      color: #007bff;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .btn-delete {
      width: 100%;
      padding: 8px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-delete:hover {
      background-color: #c82333;
    }

    .no-products {
      grid-column: 1 / -1;
      text-align: center;
      color: #777;
      font-size: 18px;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>📦 პროდუქციის მართვის სისტემა</h1>

    <!-- პროდუქტის დამატების ფორმა -->
    <div class="form-container">
      <h2>ახალი პროდუქტის დამატება</h2>
      <form id="productForm">
        <div class="form-group">
          <input type="text" id="title" placeholder="პროდუქტის დასახელება" required>
          <input type="number" id="price" placeholder="ფასი (₾)" step="0.01" required>
          <input type="url" id="image" placeholder="სურათის ლინკი (URL)" required>
        </div>
        <button type="submit" class="btn-add">➕ პროდუქტის დამატება</button>
      </form>
    </div>

    <!-- პროდუქტების სია -->
    <h2>პროდუქცია საიტზე</h2>
    <div class="products-grid" id="productsGrid">
      <!-- აქ ჩაიტვირთება პროდუქტები JavaScript-ის საშუალებით -->
    </div>
  </div>

  <script>
    // 1. ელემენტების წამოღება HTML-იდან
    const productForm = document.getElementById('productForm');
    const productsGrid = document.getElementById('productsGrid');

    // 2. პროდუქტების წამოღება LocalStorage-იდან (თუ ცარიელია, შექმნის ცარიელ მასივს)
    let products = JSON.parse(localStorage.getItem('my_products')) || [];

    // 3. ფუნქცია: პროდუქტების ეკრანზე გამოჩენა (Render)
    function renderProducts() {
      productsGrid.innerHTML = ''; // ჯერ ვასუფთავებთ ძველ კონტენტს

      if (products.length === 0) {
        productsGrid.innerHTML = '<p class="no-products">პროდუქცია ჯერ არ არის დამატებული.</p>';
        return;
      }

      // თითოეული პროდუქტისთვის ბარათის აწყობა
      products.forEach((product, index) => {
        const card = document.createElement('div');
        card.classList.add('product-card');

        card.innerHTML = `
          <img src="${product.image}" alt="${product.title}" class="product-img" onerror="this.src='https://via.placeholder.com/250x180?text=No+Image'">
          <div class="product-info">
            <div class="product-title">${product.title}</div>
            <div class="product-price">${product.price} ₾</div>
            <button class="btn-delete" onclick="deleteProduct(${index})">🗑️ წაშლა</button>
          </div>
        `;

        productsGrid.appendChild(card);
      });
    }

    // 4. ფუნქცია: ახალი პროდუქტის დამატება
    productForm.addEventListener('submit', function(event) {
      event.preventDefault(); // გვერდის გადატვირთვის აღკვეთა

      // ფორმიდან მნიშვნელობების წამოღება
      const title = document.getElementById('title').value;
      const price = document.getElementById('price').value;
      const image = document.getElementById('image').value;

      // ახალი ობიექტის შექმნა
      const newProduct = {
        title: title,
        price: price,
        image: image
      };

      // მასივში ჩამატება
      products.push(newProduct);

      // LocalStorage-ში შენახვა
      localStorage.setItem('my_products', JSON.stringify(products));

      // ეკრანის განახლება და ფორმის გასუფთავება
      renderProducts();
      productForm.reset();
    });

    // 5. ფუნქცია: პროდუქტის წაშლა
    function deleteProduct(index) {
      // მასივიდან ინდექსით ამოშლა
      products.splice(index, 1);

      // განახლებული მასივის ხელახლა შენახვა LocalStorage-ში
      localStorage.setItem('my_products', JSON.stringify(products));

      // ეკრანის განახლება
      renderProducts();
    }

    // 6. გვერდის ჩატვირთვისთანავე პროდუქტების გამოჩენა
    renderProducts();
  </script>

</body>
</html>
