<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINI MARKET | Premium Store</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0d47a1;
            --accent: #d32f2f;
            --gold: #ffb300;
            --bg: #f4f6f9;
            --dark: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: #333; padding-bottom: 90px; }

        /* Top Header */
        .top-nav {
            background: var(--dark); color: white; padding: 8px 20px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; flex-wrap: wrap; gap: 10px;
        }

        .lang-picker button {
            background: rgba(255,255,255,0.15); color: white; border: none;
            padding: 4px 10px; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .lang-picker button.active { background: var(--gold); color: black; }

        header {
            background: white; padding: 15px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 999;
        }

        .header-wrap {
            max-width: 1200px; margin: 0 auto; display: flex;
            align-items: center; justify-content: space-between; gap: 15px; flex-wrap: wrap;
        }

        .brand-logo { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .brand-logo img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
        .brand-title h1 { font-size: 24px; color: var(--primary); font-weight: 900; line-height: 1; }
        .brand-title span { font-size: 12px; color: var(--accent); font-weight: 700; }

        .search-box { flex: 1; max-width: 400px; position: relative; }
        .search-box input {
            width: 100%; padding: 10px 40px 10px 16px; border: 2px solid #e2e8f0;
            border-radius: 25px; outline: none; font-size: 14px;
        }
        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

        /* Banner */
        .hero { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .hero-card {
            background: linear-gradient(135deg, #0d47a1, #1e88e5); color: white;
            border-radius: 20px; padding: 30px; display: flex;
            justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
        }

        /* Products Grid */
        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px;
        }

        .card {
            background: white; border-radius: 16px; overflow: hidden;
            border: 1px solid #e2e8f0; transition: transform 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        .card-img { height: 190px; width: 100%; background: #fff; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 15px; }
        .card-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; color: var(--dark); }
        .card-price { font-size: 20px; font-weight: 900; color: var(--accent); margin-bottom: 12px; }

        .buy-btn {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* Floating AI & Cart */
        .ai-float {
            position: fixed; bottom: 85px; right: 20px; background: #2563eb;
            color: white; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; cursor: pointer; box-shadow: 0 5px 20px rgba(37,99,235,0.4); z-index: 1000;
        }

        .cart-float {
            position: fixed; bottom: 15px; right: 20px; background: var(--accent);
            color: white; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; box-shadow: 0 5px 20px rgba(211,47,47,0.4); z-index: 1000;
        }

        /* AI Window */
        .ai-box {
            position: fixed; bottom: 155px; right: 20px; width: 340px; height: 430px;
            background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none; flex-direction: column; z-index: 1000; overflow: hidden; border: 1px solid #ddd;
        }
        .ai-head { background: #2563eb; color: white; padding: 12px 15px; font-weight: 700; display: flex; justify-content: space-between; }
        .ai-body { flex: 1; padding: 12px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 10px; }
        .ai-msg { padding: 10px 14px; border-radius: 12px; font-size: 13px; max-width: 85%; line-height: 1.4; }
        .ai-msg.bot { background: #e2e8f0; align-self: flex-start; color: #0f172a; }
        .ai-msg.user { background: #2563eb; color: white; align-self: flex-end; }
        .ai-input { padding: 10px; display: flex; gap: 6px; border-top: 1px solid #eee; background: white; }
        .ai-input input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        .ai-input button { background: #2563eb; color: white; border: none; padding: 8px 12px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-nav">
        <div>📍 ქ. ახალციხე, იაძის ქ. №2 | 📞 +995 500 22 48 22</div>
        <div class="lang-picker">
            <button class="active" onclick="setLang('ka', this)">KA</button>
            <button onclick="setLang('en', this)">EN</button>
            <button onclick="setLang('ru', this)">RU</button>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="header-wrap">
            <a href="#" class="brand-logo">
                <!-- ლოგოს სურათი ჩასმულია პირდაპირ -->
                <img src="WhatsApp Image 2026-06-27 at 20.59.49.jpeg" alt="MINI MARKET Logo" id="mainLogo">
                <div class="brand-title">
                    <h1>MINI MARKET</h1>
                    <span id="subTitle">თქვენი უბნის მარკეტი</span>
                </div>
            </a>

            <div class="search-box">
                <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="ძებნა...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>
    </header>

    <!-- Banner -->
    <div class="hero">
        <div class="hero-card">
            <div>
                <h2 id="heroTitle">🥩 ყოველდღე ახალი ხორცპროდუქტები</h2>
                <p id="heroDesc">საუკეთესო ხარისხის საქონლისა და ღორის ხორცი ახალციხეში!</p>
            </div>
        </div>
    </div>

    <!-- Products Grid -->
    <div class="main-container">
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Floating Buttons -->
    <div class="ai-float" onclick="toggleAI()"><i class="fa-solid fa-robot"></i></div>
    <div class="cart-float"><i class="fa-solid fa-basket-shopping"></i></div>

    <!-- AI Voice Assistant -->
    <div class="ai-box" id="aiBox">
        <div class="ai-head">
            <span><i class="fa-solid fa-robot"></i> Voice AI Assistant</span>
            <i class="fa-solid fa-xmark" onclick="toggleAI()" style="cursor:pointer;"></i>
        </div>
        <div class="ai-body" id="aiBody">
            <div class="ai-msg bot" id="aiWelcome">გამარჯობა! მე ვარ MINI MARKET-ის AI ასისტენტი. რით დაგეხმაროთ? 🔊</div>
        </div>
        <div class="ai-input">
            <input type="text" id="aiIn" placeholder="Write message..." onkeypress="if(event.key==='Enter') sendAI()">
            <button onclick="sendAI()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let currentLang = 'ka';

        // პროდუქტები რეალური, მაღალი ხარისხის ფოტოებით Unsplash-იდან
        const products = [
            {
                id: 1,
                name: { ka: "ახალი საქონლის ხორცი (1კგ)", en: "Fresh Beef (1kg)", ru: "Свежая говядина (1кг)" },
                price: 22.00,
                img: "https://images.unsplash.com/photo-1603048588665-791ca8aea617?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: 2,
                name: { ka: "ახალი ღორის ხორცი (1კგ)", en: "Fresh Pork (1kg)", ru: "Свежая свинина (1кг)" },
                price: 16.50,
                img: "https://images.unsplash.com/photo-1602470520998-f4a52199a3d6?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: 3,
                name: { ka: "ყავა LATINO (100გრ) + პრიზი", en: "Coffee LATINO + Prize", ru: "Кофе LATINO + Приз" },
                price: 2.50,
                img: "https://images.unsplash.com/photo-1559056199-641a0ac8b55e?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: 4,
                name: { ka: "შაქარი (1კგ)", en: "Sugar (1kg)", ru: "Сахар (1кг)" },
                price: 2.80,
                img: "https://images.unsplash.com/photo-1581441363689-1f3c3c414635?auto=format&fit=crop&w=600&q=80"
            }
        ];

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-img"><img src="${p.img}" alt="${p.name[currentLang]}"></div>
                        <div class="card-body">
                            <div class="card-title">${p.name[currentLang]}</div>
                            <div class="card-price">${p.price.toFixed(2)} ₾</div>
                            <button class="buy-btn" onclick="buyWA('${p.name[currentLang]}')">
                                <i class="fa-brands fa-whatsapp"></i> WhatsApp Buy
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function setLang(lang, btn) {
            currentLang = lang;
            document.querySelectorAll('.lang-picker button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if(lang === 'ka') {
                document.getElementById('subTitle').innerText = "თქვენი უბნის მარკეტი";
                document.getElementById('heroTitle').innerText = "🥩 ყოველდღე ახალი ხორცპროდუქტები";
                document.getElementById('aiWelcome').innerText = "გამარჯობა! მე ვარ MINI MARKET-ის AI ასისტენტი. რით დაგეხმაროთ? 🔊";
            } else if(lang === 'en') {
                document.getElementById('subTitle').innerText = "Your Neighborhood Market";
                document.getElementById('heroTitle').innerText = "🥩 Daily Fresh Meat Products";
                document.getElementById('aiWelcome').innerText = "Hello! I am MINI MARKET's AI Assistant. How can I help you? 🔊";
            } else if(lang === 'ru') {
                document.getElementById('subTitle').innerText = "Маркет вашего района";
                document.getElementById('heroTitle').innerText = "🥩 Ежедневно свежее мясо";
                document.getElementById('aiWelcome').innerText = "Здравствуйте! Я AI ассистент MINI MARKET. Чем могу помочь? 🔊";
            }
            renderProducts();
        }

        function toggleAI() {
            const box = document.getElementById('aiBox');
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        }

        function speak(text, lang) {
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(text);
                if(lang === 'ka') u.lang = 'ka-GE';
                else if(lang === 'en') u.lang = 'en-US';
                else if(lang === 'ru') u.lang = 'ru-RU';
                window.speechSynthesis.speak(u);
            }
        }

        function sendAI() {
            const input = document.getElementById('aiIn');
            const txt = input.value.trim();
            if(!txt) return;

            const body = document.getElementById('aiBody');
            body.innerHTML += `<div class="ai-msg user">${txt}</div>`;
            input.value = '';

            setTimeout(() => {
                let reply = "";
                if(currentLang === 'ka') {
                    reply = "გმადლობთ შეკითხვისთვის! ზუსტი პასუხისთვის შეგიძლიათ მოგვწეროთ პირდაპირ WhatsApp-ში.";
                } else if(currentLang === 'en') {
                    reply = "Thank you for asking! For immediate support, click to write us on WhatsApp.";
                } else {
                    reply = "Спасибо за вопрос! Для точного ответа вы можете написать нам прямо в WhatsApp.";
                }

                body.innerHTML += `<div class="ai-msg bot">${reply} <br><br> <a href="https://wa.me/995500224822?text=${encodeURIComponent(txt)}" target="_blank" style="color:#0d47a1; font-weight:bold;">📲 Send to WhatsApp</a></div>`;
                body.scrollTop = body.scrollHeight;
                speak(reply, currentLang);
            }, 500);
        }

        function buyWA(name) {
            window.open(`https://wa.me/995500224822?text=გამარჯობა, მინდა შევიძინო: ${encodeURIComponent(name)}`, '_blank');
        }

        function filterProducts() {
            const v = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                const t = c.querySelector('.card-title').innerText.toLowerCase();
                c.style.display = t.includes(v) ? 'flex' : 'none';
            });
        }

        renderProducts();
    </script>
</body>
</html>
