<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>შეკვეთა WhatsApp-ით</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        .form-card h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 22px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #25D366;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-whatsapp {
            width: 100%;
            background-color: #25D366;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .btn-whatsapp:hover {
            background-color: #1ebc57;
        }

        .btn-whatsapp:active {
            transform: scale(0.98);
        }

        .btn-whatsapp svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>გააგზავნეთ შეტყობინება</h2>
        
        <form onsubmit="event.preventDefault(); sendToWhatsApp();">
            <div class="input-group">
                <label for="customerName">სახელი და გვარი</label>
                <input type="text" id="customerName" placeholder="შეიყვანეთ სახელი" required>
            </div>

            <div class="input-group">
                <label for="customerPhone">ტელეფონის ნომერი</label>
                <input type="tel" id="customerPhone" placeholder="მაგ: 599123456" required>
            </div>

            <div class="input-group">
                <label for="orderDetails">შეტყობინება / შეკვეთა</label>
                <textarea id="orderDetails" placeholder="ჩაწერთ დეტალები..." required></textarea>
            </div>

            <button type="submit" class="btn-whatsapp">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3 18.6-68.1-4.4-6.9c-18.6-29.5-28.4-63.3-28.4-98.2 0-101.4 82.5-184 184-184 49.1 0 95.3 19.1 130 53.8 34.8 34.7 54 80.9 54 130 0 101.4-82.5 184-183.4 184zm100.9-138c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
                </svg>
                გაგზავნა WhatsApp-ზე
            </button>
        </form>
    </div>

    <script>
        function sendToWhatsApp() {
            // ოფიციალური ნომერი
            const phoneNumber = "995500224822";

            // მონაცემების წამოღება ველებიდან
            const name = document.getElementById("customerName").value;
            const phone = document.getElementById("customerPhone").value;
            const details = document.getElementById("orderDetails").value;

            // შეტყობინების ტექსტი
            const message = `*ახალი შეტყობინება/შეკვეთა*%0A%0A` +
                            `*სახელი:* ${encodeURIComponent(name)}%0A` +
                            `*ტელეფონი:* ${encodeURIComponent(phone)}%0A` +
                            `*დეტალები:* ${encodeURIComponent(details)}`;

            // WhatsApp-ის ბმული
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${message}`;

            // გახსნა ახალ ჩანართში
            window.open(whatsappUrl, '_blank');
        }
    </script>

</body>
</html>
