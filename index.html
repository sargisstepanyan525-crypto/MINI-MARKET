<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Market - ონლაინ მაღაზია</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            padding-bottom: 80px;
        }

        header {
            background-color: #232f3e;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #25D366;
        }

        .cart-icon-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .section-title {
            margin-bottom: 20px;
            font-size: 22px;
            border-bottom: 2px solid #25D366;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-3px);
        }

        .product-img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 18px;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .add-to-cart-btn {
            background: #232f3e;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .add-to-cart-btn:hover {
            background: #34495e;
        }

        /* Cart Section / Modal */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .cart-content {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f1f1f1;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-item-controls button {
            width: 25px;
            height: 25px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
        }

        .form-group {
            margin-top: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .total-price {
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
            text-align: right;
            color: #27ae60;
        }

        .order-whatsapp-btn {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .order-whatsapp-btn:hover {
            background: #21b858;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Mini Market</div>
        <button class="cart-icon-btn" onclick="toggleCart()">
            🛒 კალათა (<span id="cart-count">0</span>)
        </button>
    </header>

    <div class="container">
        <h2 class="section-title">პროდუქცია</h2>
        <div class="products-grid" id="products-container">
            <!-- პროდუქტები ჩაიტვირთება JavaScript-ით -->
        </div>
    </div>

    <!-- კალათის ფანჯარა -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h3>თქვენი კალათა</h3>
                <button class="close-btn" onclick="toggleCart()">&times;</button>
            </div>

            <div id="cart-items">
                <!-- კალათის ნივთები -->
            </div>

            <div class="total-price" id="total-price">სულ: 0.00 ₾</div>

            <hr>

            <form onsubmit="event.preventDefault(); sendOrderToWhatsApp();">
                <div class="form-group">
                    <label>სახელი და გვარი *</label>
                    <input type="text" id="custName" required placeholder="მაგ: გიორგი">
                </div>
                <div class="form-group">
                    <label>ტელეფონის ნომერი *</label>
                    <input type="tel" id="custPhone" required placeholder="მაგ: 599123456">
                </div>
                <div class="form-group">
                    <label>მისამართი / მიტანის ადგილი *</label>
                    <input type="text" id="custAddress" required placeholder="ქუჩა, ბინის №">
                </div>
                <div class="form-group">
                    <label>დამატებითი კომენტარი</label>
                    <textarea id="custNote" rows="2" placeholder="შენიშვნა..."></textarea>
                </div>

                <button type="submit" class="order-whatsapp-btn">
                    შეკვეთის გაგზავნა WhatsApp-ზე
                </button>
            </form>
        </div>
    </div>

    <script>
        // პროდუქტების სია
        const products = [
            { id: 1, name: "პური", price: 1.20, img: "https://via.placeholder.com/150?text=პური" },
            { id: 2, name: "რძე 1L", price: 4.50, img: "https://via.placeholder.com/150?text=რძე" },
            { id: 3, name: "ყველი 500გ", price: 8.50, img: "https://via.placeholder.com/150?text=ყველი" },
            { id: 4, name: "კარაქი", price: 6.00, img: "https://via.placeholder.com/150?text=კარაქი" },
            { id: 5, name: "შაქარი 1კგ", price: 3.20, img: "https://via.placeholder.com/150?text=შაქარი" },
            { id: 6, name: "ყავა", price: 12.00, img: "https://via.placeholder.com/150?text=ყავა" }
        ];

        let cart = [];

        // პროდუქტების გამოჩენა გვერდზე
        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            products.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" alt="${p.name}" class="product-img">
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">${p.price.toFixed(2)} ₾</div>
                        <button class="add-to-cart-btn" onclick="addToCart(${p.id})">კალათაში დამატება</button>
                    </div>
                `;
            });
        }

        // კალათაში დამატება
        function addToCart(productId) {
            const item = cart.find(x => x.id === productId);
            if (item) {
                item.qty++;
            } else {
                const product = products.find(x => x.id === productId);
                cart.push({ ...product, qty: 1 });
            }
            updateCart();
        }

        // რაოდენობის შეცვლა
        function changeQty(productId, delta) {
            const item = cart.find(x => x.id === productId);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(x => x.id !== productId);
                }
            }
            updateCart();
        }

        // კალათის განახლება
        function updateCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const totalPriceEl = document.getElementById('total-price');

            cartItemsContainer.innerHTML = '';
            let total = 0;
            let count = 0;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align:center; color:#777;">კალათა ცარიელია</p>';
            } else {
                cart.forEach(item => {
                    const itemTotal = item.price * item.qty;
                    total += itemTotal;
                    count += item.qty;

                    cartItemsContainer.innerHTML += `
                        <div class="cart-item">
                            <div>
                                <strong>${item.name}</strong><br>
                                <small>${item.price.toFixed(2)} ₾ x ${item.qty}</small>
                            </div>
                            <div class="cart-item-controls">
                                <button onclick="changeQty(${item.id}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button onclick="changeQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    `;
                });
            }

            cartCount.innerText = count;
            totalPriceEl.innerText = `სულ: ${total.toFixed(2)} ₾`;
        }

        // კალათის ფანჯრის გამოჩენა/დამალვა
        function toggleCart() {
            const modal = document.getElementById('cartModal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        // შეკვეთის გაგზავნა WhatsApp-ზე
        function sendOrderToWhatsApp() {
            if (cart.length === 0) {
                alert("თქვენი კალათა ცარიელია!");
                return;
            }

            const phoneNum = "995500224822";
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;
            const note = document.getElementById('custNote').value;

            let itemsList = "";
            let total = 0;

            cart.forEach(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                itemsList += `• ${item.name} (${item.qty}x) - ${subtotal.toFixed(2)} ₾%0A`;
            });

            let message = `🛒 *ახალი შეკვეთა MINI MARKET-იდან*%0A%0A`;
            message += `*მომხმარებელი:* ${encodeURIComponent(name)}%0A`;
            message += `*ტელეფონი:* ${encodeURIComponent(phone)}%0A`;
            message += `*მისამართი:* ${encodeURIComponent(address)}%0A`;
            if (note) message += `*შენიშვნა:* ${encodeURIComponent(note)}%0A`;
            message += `%0A*შეკვეთის სია:*%0A${itemsList}%0A`;
            message += `*სულ გადასახდელი:* ${total.toFixed(2)} ₾`;

            const whatsappUrl = `https://wa.me/${phoneNum}?text=${message}`;
            window.open(whatsappUrl, '_blank');
        }

        // საიტის ჩატვირთვისას პროდუქტების გამოჩენა
        renderProducts();
    </script>
</body>
</html>
