<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINI MARKET | ონლაინ მარკეტი</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 90px; }

        /* Top Bar */
        .top-bar {
            background: #0f172a; color: white; padding: 8px 20px;
            display: flex; justify-content: space-between; align-items: center; font-size: 13px;
        }

        .lang-picker button {
            background: rgba(255,255,255,0.15); color: white; border: none;
            padding: 4px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .lang-picker button.active { background: #f59e0b; color: #000; }

        /* Header */
        header {
            background: white; padding: 15px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            position: sticky; top: 0; z-index: 999;
        }

        .header-wrap {
            max-width: 1200px; margin: 0 auto; display: flex;
            align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
        }

        .brand-area { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .brand-area img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .brand-area h1 { font-size: 22px; color: var(--primary); font-weight: 900; letter-spacing: -0.5px; }

        .search-area { flex: 1; max-width: 450px; position: relative; }
        .search-area input {
            width: 100%; padding: 12px 45px 12px 18px; border: 2px solid #e2e8f0;
            border-radius: 30px; outline: none; font-size: 14px; background: #f8fafc; transition: 0.2s;
        }
        .search-area input:focus { border-color: var(--primary); background: white; }
        .search-area i { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

        /* Modern Banner */
        .hero-banner { max-width: 1200px; margin: 25px auto 0; padding: 0 20px; }
        .banner-box {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 25px rgba(37,99,235,0.25);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .banner-box h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .banner-box p { font-size: 14px; opacity: 0.9; }

        /* Catalog Main Area */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .section-header { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: var(--text-main); display: flex; align-items: center; gap: 8px; }

        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px;
        }

        .product-card {
            background: var(--card-bg); border-radius: 16px; overflow: hidden;
            border: 1px solid #e2e8f0; transition: all 0.25s ease;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,0.08); border-color: #cbd5e1; }

        .img-wrap { height: 200px; width: 100%; padding: 15px; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card-details { padding: 16px; background: white; border-top: 1px solid #f1f5f9; }
        .title { font-size: 15px; font-weight: 700; height: 42px; line-height: 1.3; overflow: hidden; color: var(--text-main); }
        .price { font-size: 20px; font-weight: 900; color: var(--accent); margin: 10px 0 14px; }

        .wa-btn {
            width: 100%; background: #25D366; color: white; border: none;
            padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; transition: 0.2s;
        }
        .wa-btn:hover { background: #20ba5a; }

        /* Floating AI Assistant */
        .ai-float-btn {
            position: fixed; bottom: 25px; right: 25px; background: var(--primary);
            color: white; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; cursor: pointer; box-shadow: 0 6px 20px rgba(37,99,235,0.4); z-index: 1000; transition: 0.2s;
        }
        .ai-float-btn:hover { transform: scale(1.08); }

        .ai-window {
            position: fixed; bottom: 95px; right: 25px; width: 340px; height: 440px;
            background: white; border-radius: 20px; box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            display: none; flex-direction: column; z-index: 1000; overflow: hidden; border: 1px solid #e2e8f0;
        }
        .ai-head { background: var(--primary); color: white; padding: 14px 16px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .ai-body { flex: 1; padding: 14px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 10px; }
        .chat-msg { padding: 10px 14px; border-radius: 12px; font-size: 13px; max-width: 85%; line-height: 1.4; }
        .chat-msg.bot { background: #e2e8f0; color: #0f172a; align-self: flex-start; }
        .chat-msg.user { background: var(--primary); color: white; align-self: flex-end; }
        .ai-foot { padding: 10px; display: flex; gap: 8px; background: white; border-top: 1px solid #f1f5f9; }
        .ai-foot input { flex: 1; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 20px; outline: none; font-size: 13px; }
        .ai-foot button { background: var(--primary); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <div>📍 ქ. ახალციხე, იაძის ქ. №2 | 📞 +995 500 22 48 22</div>
        <div class="lang-picker">
            <button class="active" onclick="changeLang('ka', this)">KA</button>
            <button onclick="changeLang('en', this)">EN</button>
            <button onclick="changeLang('ru', this)">RU</button>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="header-wrap">
            <a href="#" class="brand-area">
                <img src="WhatsApp Image 2026-06-27 at 20.59.49.jpeg" alt="MINI MARKET Logo">
                <div>
                    <h1>MINI MARKET</h1>
                </div>
            </a>

            <div class="search-area">
                <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="ძებნა კატალოგში...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>
    </header>

    <!-- Banner -->
    <div class="hero-banner">
        <div class="banner-box">
            <div>
                <h2 id="bannerTitle">🛒 ონლაინ მარკეტი ახალციხეში</h2>
                <p id="bannerDesc">ხარისხიანი პროდუქცია და სწრაფი მომსახურება</p>
            </div>
        </div>
    </div>

    <!-- Products -->
    <div class="container">
        <div class="section-header" id="sectionTitle"><i class="fa-solid fa-store" style="color:var(--primary);"></i> პროდუქციის კატალოგი</div>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- AI Voice Floating -->
    <div class="ai-float-btn" onclick="toggleAI()"><i class="fa-solid fa-robot"></i></div>

    <!-- AI Chat Window -->
    <div class="ai-window" id="aiWindow">
        <div class="ai-head">
            <span><i class="fa-solid fa-robot"></i> AI Voice Assistant</span>
            <i class="fa-solid fa-xmark" onclick="toggleAI()" style="cursor:pointer;"></i>
        </div>
        <div class="ai-body" id="aiBody">
            <div class="chat-msg bot" id="aiWelcome">გამარჯობა! მე ვარ MINI MARKET-ის AI ასისტენტი. რით დაგეხმაროთ? 🔊</div>
        </div>
        <div class="ai-foot">
            <input type="text" id="aiInput" placeholder="Write question..." onkeypress="if(event.key==='Enter') sendAIMsg()">
            <button onclick="sendAIMsg()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let currentLang = 'ka';

        // მხოლიდ ის პროდუქტები, რომელთა 100%-ით ზუსტი ფოტოებიც გვაქვს
        const products = [
            {
                id: 1,
                name: { ka: "ქათმის კვერცხი (10 ცალი)", en: "Chicken Eggs (10 pcs)", ru: "Куриные яйца (10 шт)" },
                price: 4.50,
                img: "https://images.unsplash.com/photo-1582721478779-0ae163c05a60?auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 2,
                name: { ka: "ლუდი ჰაინეკენი (Heineken) 0.5L", en: "Heineken Beer 0.5L", ru: "Пиво Heineken 0.5л" },
                price: 3.80,
                img: "https://images.unsplash.com/photo-1608270586620-248524c67de9?auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 3,
                name: { ka: "ყავა Jacobs Monarch (100გრ)", en: "Coffee Jacobs Monarch (100g)", ru: "Кофе Jacobs Monarch (100г)" },
                price: 10.50,
                img: "https://images.unsplash.com/photo-1559056199-641a0ac8b55e?auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 4,
                name: { ka: "შაქარი თეთრი (1კგ)", en: "White Sugar (1kg)", ru: "Сахар белый (1кг)" },
                price: 2.80,
                img: "https://images.unsplash.com/photo-1581441363689-1f3c3c414635?auto=format&fit=crop&w=500&q=80"
            }
        ];

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="img-wrap">
                            <img src="${p.img}" alt="${p.name[currentLang]}">
                        </div>
                        <div class="card-details">
                            <div class="title">${p.name[currentLang]}</div>
                            <div class="price">${p.price.toFixed(2)} ₾</div>
                            <button class="wa-btn" onclick="buyWA('${p.name[currentLang]}')">
                                <i class="fa-brands fa-whatsapp"></i> WhatsApp შეკვეთა
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function changeLang(lang, btn) {
            currentLang = lang;
            document.querySelectorAll('.lang-picker button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if(lang === 'ka') {
                document.getElementById('bannerTitle').innerText = "🛒 ონლაინ მარკეტი ახალციხეში";
                document.getElementById('bannerDesc').innerText = "ხარისხიანი პროდუქცია და სწრაფი მომსახურება";
                document.getElementById('sectionTitle').innerHTML = '<i class="fa-solid fa-store" style="color:var(--primary);"></i> პროდუქციის კატალოგი';
                document.getElementById('aiWelcome').innerText = "გამარჯობა! მე ვარ MINI MARKET-ის AI ასისტენტი. რით დაგეხმაროთ? 🔊";
            } else if(lang === 'en') {
                document.getElementById('bannerTitle').innerText = "🛒 Online Market in Akhaltsikhe";
                document.getElementById('bannerDesc').innerText = "Quality products and fast service";
                document.getElementById('sectionTitle').innerHTML = '<i class="fa-solid fa-store" style="color:var(--primary);"></i> Product Catalog';
                document.getElementById('aiWelcome').innerText = "Hello! I am MINI MARKET's AI Assistant. How can I help you? 🔊";
            } else if(lang === 'ru') {
                document.getElementById('bannerTitle').innerText = "🛒 Онлайн Маркет в Ахалцихе";
                document.getElementById('bannerDesc').innerText = "Качественные продукты и быстрое обслуживание";
                document.getElementById('sectionTitle').innerHTML = '<i class="fa-solid fa-store" style="color:var(--primary);"></i> Каталог Товаров';
                document.getElementById('aiWelcome').innerText = "Здравствуйте! Я AI ассистент MINI MARKET. Чем могу помочь? 🔊";
            }
            renderProducts();
        }

        function toggleAI() {
            const win = document.getElementById('aiWindow');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        function speak(text, lang) {
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(text);
                if(lang === 'ka') u.lang = 'ka-GE';
                else if(lang === 'en') u.lang = 'en-US';
                else if(lang === 'ru') u.lang = 'ru-RU';
                window.speechSynthesis.speak(u);
            }
        }

        function sendAIMsg() {
            const input = document.getElementById('aiInput');
            const txt = input.value.trim();
            if(!txt) return;

            const body = document.getElementById('aiBody');
            body.innerHTML += `<div class="chat-msg user">${txt}</div>`;
            input.value = '';

            setTimeout(() => {
                let reply = "";
                if(currentLang === 'ka') {
                    reply = "გმადლობთ შეკითხვისთვის! ზუსტი პასუხისთვის შეგიძლიათ მოგვწეროთ პირდაპირ WhatsApp-ში.";
                } else if(currentLang === 'en') {
                    reply = "Thank you for asking! For direct response, please write to us on WhatsApp.";
                } else {
                    reply = "Спасибо за вопрос! Для точного ответа напишите нам прямо в WhatsApp.";
                }

                body.innerHTML += `
                    <div class="chat-msg bot">
                        ${reply} <br><br>
                        <a href="https://wa.me/995500224822?text=${encodeURIComponent('კითხვა: ' + txt)}" target="_blank" style="color:var(--primary); font-weight:bold;">
                            📲 გაგზავნა WhatsApp-ზე
                        </a>
                    </div>`;
                body.scrollTop = body.scrollHeight;
                speak(reply, currentLang);
            }, 400);
        }

        function buyWA(pName) {
            window.open(`https://wa.me/995500224822?text=გამარჯობა, მინდა შევიძინო: ${encodeURIComponent(pName)}`, '_blank');
        }

        function filterItems() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(card => {
                const title = card.querySelector('.title').innerText.toLowerCase();
                card.style.display = title.includes(val) ? 'flex' : 'none';
            });
        }

        renderProducts();
    </script>
</body>
</html>
